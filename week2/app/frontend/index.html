<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Action Item Extractor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: #f6f8fa;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 750px;
      margin: 40px auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 6px 24px #0001;
      padding: 32px 32px 40px 32px;
    }
    h1 {
      text-align: center;
      color: #293042;
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }
    textarea {
      width: 100%;
      min-height: 90px;
      font-size: 1.1rem;
      border: 1.2px solid #d0d4da;
      border-radius: 8px;
      padding: 10px;
      box-sizing: border-box;
      resize: vertical;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: #97bef4;
    }
    .actions {
      text-align: right;
      margin-bottom: 30px;
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      margin-left: 8px;
      border: none;
      border-radius: 7px;
      background: #2563eb;
      color: #fff;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 1px 3px #0002;
      transition: background 0.17s;
    }
    button.special {
      background: #04b38f;
    }
    button:disabled {
      background: #b8c2cc;
      cursor: not-allowed;
    }
    section {
      margin-top: 32px;
    }
    .items-list, .notes-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .items-list li {
      padding: 12px 8px;
      margin-bottom: 8px;
      background: #f1f4f8;
      border-radius: 6px;
      border-left: 4px solid #3b82f6;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .items-list li.done {
      opacity: 0.57;
      text-decoration: line-through;
      border-left: 4px solid #8ae2be;
    }
    .done-btn {
      background: #36ce8a;
      color: #fff;
      border: none;
      padding: 5px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.15s;
      margin-left: 12px;
    }
    .done-btn:disabled {
      background: #aad7c8;
    }
    .note-item {
      background: #f8fafc;
      padding: 10px 8px;
      border-left: 4px solid #eab308;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 1em;
      color: #555a67;
    }
    @media (max-width: 650px) {
      .container {
        padding: 16px 4vw;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Action Item Extractor</h1>
    <label for="note-input" style="font-weight:600; color:#333;">Paste or type your notes:</label><br>
    <textarea id="note-input" placeholder="e.g. • Buy milk&#10;• Prepare report for Friday meeting"></textarea>
    <div>
      <label><input type="checkbox" id="save-note" style="vertical-align:middle;margin-right:4px;">Save note to database</label>
    </div>
    <div class="actions">
      <button id="extract-heuristic-btn">Extract (Heuristic)</button>
      <button id="extract-llm-btn" class="special">Extract (AI LLM)</button>
    </div>

    <section>
      <h2 style="font-size:1.4rem; color:#1d2331;">Extracted Action Items</h2>
      <ul id="items-list" class="items-list"></ul>
    </section>

    <section>
      <h2 style="font-size:1.18rem; color:#293042;">Saved Notes</h2>
      <ul id="notes-list" class="notes-list"></ul>
    </section>
  </div>
  <script>
    const itemsList = document.getElementById('items-list');
    const notesList = document.getElementById('notes-list');
    const noteInput = document.getElementById('note-input');
    const extractBtn = document.getElementById('extract-heuristic-btn');
    const extractLlmBtn = document.getElementById('extract-llm-btn');
    const saveNoteCheckbox = document.getElementById('save-note');
    let lastNoteId = null;

    function escapeHtml(text) {
      let span = document.createElement("span");
      span.textContent = text;
      return span.innerHTML;
    }

    function setBtnState(loading) {
      extractBtn.disabled = loading;
      extractLlmBtn.disabled = loading;
      extractBtn.textContent = loading ? "Extracting..." : "Extract (Heuristic)";
      extractLlmBtn.textContent = loading ? "Extracting..." : "Extract (AI LLM)";
    }

    function renderItems(items) {
      itemsList.innerHTML = "";
      if (!items.length) {
        itemsList.innerHTML = "<li style='opacity:0.66;'>No items found.</li>";
        return;
      }
      for (const item of items) {
        const li = document.createElement('li');
        if (item.done) li.classList.add("done");
        li.innerHTML =
          `<span>${escapeHtml(item.text)}</span>
           <button class="done-btn" ${item.done ? "disabled" : ""}>Mark Done</button>`;
        const btn = li.querySelector('.done-btn');
        btn.onclick = () => markDone(item.id, !item.done, li, btn);
        itemsList.appendChild(li);
      }
    }

    function renderNotes(notes) {
      notesList.innerHTML = "";
      if (!notes.length) {
        notesList.innerHTML = "<li style='opacity:0.66;font-style:italic;'>No notes found.</li>";
        return;
      }
      for (const note of notes) {
        const li = document.createElement('li');
        li.className = "note-item";
        li.innerHTML = `<div>${escapeHtml(note.text)}</div>
                        <div style="font-size:.90em;color:#999; margin-top:2px;">
                          <span>Created: ${new Date(note.created_at).toLocaleString()}</span>
                        </div>`;
        notesList.appendChild(li);
      }
    }

    async function extractItems(endpoint) {
      const text = noteInput.value.trim();
      if (!text) return;
      setBtnState(true);
      itemsList.innerHTML = "<li style='opacity:0.7;'>Extracting, please wait...</li>";

      try {
        const resp = await fetch(`/action-items/${endpoint}`, {
          method: "POST",
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            text,
            save_note: saveNoteCheckbox.checked
          })
        });
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.detail || 'Error extracting items');
        }
        const data = await resp.json();
        lastNoteId = data.note_id || null;
        await fetchAndRenderItems(lastNoteId);
        if (saveNoteCheckbox.checked) {
          await fetchAndRenderNotes();
        }
      } catch (e) {
        itemsList.innerHTML = `<li style='color:#a00;'>${escapeHtml(e.message)}</li>`;
      }
      setBtnState(false);
    }

    async function fetchAndRenderItems(noteId) {
      let url = "/action-items";
      if (noteId) url += "?note_id=" + encodeURIComponent(noteId);
      const resp = await fetch(url);
      if (!resp.ok) throw new Error("Failed to fetch items");
      const items = await resp.json();
      renderItems(items);
    }

    async function fetchAndRenderNotes() {
      // Fetch all notes
      const resp = await fetch("/notes");
      if (resp.ok) {
        const notes = await resp.json();
        renderNotes(notes);
      }
    }

    async function markDone(id, done, li, btn) {
      btn.disabled = true;
      try {
        const resp = await fetch(`/action-items/${id}/done`, {
          method: "POST",
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({done: !!done})
        });
        if (!resp.ok) throw new Error("Failed to update item");
        li.classList.add('done');
        btn.disabled = true;
      } catch (e) {
        btn.disabled = false;
        alert(e.message);
      }
    }

    // Initial population
    window.addEventListener('DOMContentLoaded', async () => {
      await fetchAndRenderItems();
      await fetchAndRenderNotes();
    });

    extractBtn.addEventListener('click', () => extractItems('extract'));
    extractLlmBtn.addEventListener('click', () => extractItems('extract-llm'));
  </script>
</body>
</html>
